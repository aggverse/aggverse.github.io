
<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../../assets/style.css">
</head>
<body>

<nav class="navbar">

  <div class="nav-left">
    <a href="../../index.html" class="nav-btn">Home</a>
    <span class="nav-current">Astral</span>
  </div>

</nav>

<main class="container">
<img class="novel-cover" src="astralcover.jpg" alt="Astral cover" />
<h1>Astral</h1>
<p><strong>Genre:</strong> Fantasy, Strategy</p>
<p><strong>Description:</strong> A world where strategy shapes destiny.</p>
<div id="continue-reading"></div>
<div id="chapters"></div>
</main>

<script>
fetch("chapters.json")
.then(r => r.json())
.then(data => {
  const el = document.getElementById("chapters");
  data.forEach(c => {
     const a = document.createElement("a");
    a.href = c.file;
    a.className = "chapter-card";
  
    a.innerHTML = '<div class="chapter-title">' + c.title + '</div>';
    el.appendChild(a);
  });
});

const currentNovel = "novel-2";
const last = localStorage.getItem("lastChapter-" + currentNovel) || localStorage.getItem("lastChapter");

if (last && last.includes("novels/" + currentNovel + "/")) {
  const btn = document.createElement("a");
  btn.href = last;
  btn.textContent = "Continue Reading";
  btn.className = "chapter-card";
  
  document.getElementById("continue-reading").appendChild(btn);
}
</script>

</body>
</html>
